<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Wii Ping Pong</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap");

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0a0a12 url("assets/hermes.png") center / cover no-repeat;
      font-family: "Nunito", Arial, Helvetica, sans-serif;
      color: #f7f7f2;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
      background: transparent;
    }

    video {
      position: fixed;
      left: -9999px;
      top: -9999px;
      width: 1px;
      height: 1px;
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <video id="webcam" autoplay muted playsinline></video>

  <script type="module">
    import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/vision_bundle.js";

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const video = document.getElementById("webcam");
    const backgroundImage = new Image();
    backgroundImage.src = "assets/hermes.png";

    const gameState = {
      mode: "loading",
      phase: "loading",
      message: "Loading hand tracker",
      dpr: 1,
      time: performance.now(),
      simTime: 0,
      renderTime: 0,
      lastVideoTime: -1,
      handLandmarker: null,
      handReady: false,
      handSeenAt: 0,
      countdownStartedAt: 0,
      pausedForHand: false,
      handLostAt: 0,
      errorTitle: "",
      errorDetail: "",
      inputMode: "hand",
      mouseButton: { x: 0, y: 0, w: 0, h: 0 },
      table: null,
      rally: 0,
      feedback: {
        text: "",
        startedAt: -Infinity,
        x: 0,
        z: 0.11
      },
      stats: {
        playerHits: 0,
        botHits: 0,
        perfectHits: 0,
        longestRally: 0,
        pointsPlayed: 0
      },
      score: { player: 0, bot: 0 },
      server: "player",
      serveStartedAt: 0,
      botServeAt: 0,
      freezeUntil: 0,
      pendingGameWinner: null,
      winner: null,
      gameOverStartedAt: 0,
      scorePulseSide: null,
      scorePulseStartedAt: -Infinity,
      playAgainButton: { x: 0, y: 0, w: 0, h: 0 },
      shakeStartedAt: -Infinity,
      shakeDuration: 60,
      shakeAmount: 2,
      audio: {
        ctx: null,
        unlocked: false
      },
      hitFlash: 0,
      netFlash: 0,
      ballTrail: [],
      player: {
        x: 0,
        z: 0.08,
        targetX: 0,
        targetZ: 0.08,
        prevX: 0,
        prevZ: 0.08,
        vx: 0,
        vz: 0,
        radius: 58,
        pulseStartedAt: -Infinity
      },
      mouse: {
        active: false,
        x: 0,
        z: 0.08
      },
      bot: {
        x: 0,
        baseZ: 0.92,
        z: 0.92,
        targetX: 0,
        radius: 52,
        flash: 0,
        history: [],
        reactionDelay: 180,
        lerpFactor: 0.08,
        aimBias: 0,
        hitAvailable: false,
        nextHitAt: 0,
        willMisAim: false,
        swingStartedAt: -Infinity,
        swingDuration: 240,
        pulseStartedAt: -Infinity
      },
      ball: null
    };

    const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
    const lerp = (a, b, t) => a + (b - a) * t;
    const ease = (t) => t * t * (3 - 2 * t);
    const randomRange = (min, max) => min + Math.random() * (max - min);
    const handIsFresh = (now) => gameState.handReady && now - gameState.handSeenAt < 650;
    const controlIsReady = (now) => gameState.inputMode === "mouse" || handIsFresh(now);
    const frameLerp = (factor, dt) => 1 - Math.pow(1 - factor, dt * 60);

    function triggerScreenShake(power = 1) {
      if (power < 0.9) {
        return;
      }

      gameState.shakeStartedAt = performance.now();
      gameState.shakeAmount = clamp(1.2 + power * 0.55, 1.2, 2);
    }

    function ensureAudio() {
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) {
        return null;
      }

      if (!gameState.audio.ctx) {
        gameState.audio.ctx = new AudioContextClass();
      }

      if (gameState.audio.ctx.state === "suspended") {
        gameState.audio.ctx.resume().catch(() => {});
      }

      gameState.audio.unlocked = true;
      return gameState.audio.ctx;
    }

    function playTone(frequency, duration, offset = 0, volume = 0.16) {
      const audio = gameState.audio.ctx;
      if (!audio || audio.state !== "running") {
        return;
      }

      const start = audio.currentTime + offset;
      const osc = audio.createOscillator();
      const gain = audio.createGain();

      osc.type = "sine";
      osc.frequency.setValueAtTime(frequency, start);
      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.linearRampToValueAtTime(volume, start + 0.004);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);

      osc.connect(gain);
      gain.connect(audio.destination);
      osc.start(start);
      osc.stop(start + duration + 0.02);
    }

    function playBallHitSound() {
      playTone(480, 0.04, 0, 0.18);
    }

    function playTableBounceSound() {
      playTone(320, 0.04, 0, 0.14);
    }

    function playPointSound() {
      playTone(523.25, 0.08, 0, 0.14);
      playTone(659.25, 0.08, 0.09, 0.13);
    }

    function playWinSound() {
      playTone(523.25, 0.09, 0, 0.13);
      playTone(659.25, 0.09, 0.1, 0.13);
      playTone(783.99, 0.09, 0.2, 0.13);
      playTone(1046.5, 0.14, 0.31, 0.14);
    }

    function resize() {
      gameState.dpr = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(window.innerWidth * gameState.dpr);
      canvas.height = Math.floor(window.innerHeight * gameState.dpr);
      ctx.setTransform(gameState.dpr, 0, 0, gameState.dpr, 0, 0);
      computeTable();
    }

    function computeTable() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const tableHeight = h * 0.7;
      const cx = w * 0.5;
      const topY = h * 0.5 - tableHeight * 0.5;
      const bottomY = h * 0.5 + tableHeight * 0.5;
      const topWidth = Math.min(w * 0.52, tableHeight * 0.78);
      const bottomWidth = Math.min(w * 0.86, tableHeight * 1.18);

      gameState.table = {
        cx,
        topY,
        bottomY,
        height: tableHeight,
        topWidth,
        bottomWidth,
        topLeft: { x: cx - topWidth * 0.5, y: topY },
        topRight: { x: cx + topWidth * 0.5, y: topY },
        bottomRight: { x: cx + bottomWidth * 0.5, y: bottomY },
        bottomLeft: { x: cx - bottomWidth * 0.5, y: bottomY }
      };

      if (!gameState.ball) {
        prepareServeBall(gameState.server);
      }
    }

    function tableWidthAt(z) {
      return lerp(gameState.table.bottomWidth, gameState.table.topWidth, ease(clamp(z, 0, 1)));
    }

    function tableYAt(z) {
      if (z < 0) {
        return gameState.table.bottomY + Math.abs(z) * gameState.table.height * 0.34;
      }
      if (z > 1) {
        return gameState.table.topY - (z - 1) * gameState.table.height * 0.34;
      }
      return lerp(gameState.table.bottomY, gameState.table.topY, ease(z));
    }

    function tablePoint(xNorm, z) {
      const width = tableWidthAt(z);
      return {
        x: gameState.table.cx + xNorm * width * 0.5,
        y: tableYAt(z)
      };
    }

    function prepareServeBall(server) {
      const servingPlayer = server === "player";
      const paddle = servingPlayer ? gameState.player : gameState.bot;
      gameState.ball = {
        active: false,
        x: paddle.x,
        y: servingPlayer ? 24 : 26,
        z: servingPlayer ? paddle.z : paddle.baseZ,
        fromX: paddle.x,
        toX: paddle.x,
        fromZ: servingPlayer ? paddle.z : paddle.baseZ,
        toZ: servingPlayer ? paddle.z : paddle.baseZ,
        start: gameState.simTime,
        duration: 1,
        arc: 0,
        spin: 0,
        sideSpin: 0,
        direction: servingPlayer ? 1 : -1,
        hasBounced: false,
        hitWindowOpen: false,
        radius: 11
      };
      gameState.bot.hitAvailable = false;
      gameState.ballTrail.length = 0;
    }

    function resetBall(server = gameState.server) {
      prepareServeBall(server);
    }

    function startServe(server, now = gameState.simTime) {
      gameState.server = server;
      gameState.phase = server === "player" ? "player-serve" : "bot-serve";
      gameState.serveStartedAt = now;
      gameState.botServeAt = now + 1500;
      gameState.rally = 0;
      gameState.netFlash = 0;
      resetBall(server);
    }

    function launchBall({ fromX, fromZ, toX, toZ, direction, power, spin, sideSpin }) {
      const now = gameState.simTime;
      const speedBoost = Math.min(gameState.rally * 32, 260);
      const powerBoost = clamp(power * 180, 0, 260);
      const baseDuration = direction > 0 ? 1080 : 1030;
      const distance = Math.abs(toZ - fromZ);
      const startingDuration = clamp(baseDuration * distance / 0.84, 720, 1180);
      const minDuration = startingDuration / 1.8;
      const duration = clamp(startingDuration - speedBoost - powerBoost, minDuration, startingDuration);

      gameState.ball = {
        active: true,
        x: fromX,
        y: 0,
        z: fromZ,
        fromX,
        toX: clamp(toX, -0.88, 0.88),
        fromZ,
        toZ,
        start: now,
        duration,
        arc: clamp(102 + power * 76 + Math.abs(spin) * 18, 92, 185),
        spin: clamp(spin, -1.35, 1.35),
        sideSpin: clamp(sideSpin, -0.8, 0.8),
        direction,
        hasBounced: false,
        hitWindowOpen: true,
        radius: 11
      };
      gameState.phase = "rally";
      gameState.ballTrail.length = 0;
      scheduleBotHit();
    }

    function scheduleBotHit() {
      const ball = gameState.ball;
      const bot = gameState.bot;

      bot.hitAvailable = false;
      if (!ball.active || ball.direction <= 0) {
        bot.history.length = 0;
        return;
      }

      const hitZ = 0.9;
      const t = clamp((hitZ - ball.fromZ) / (ball.toZ - ball.fromZ), 0.12, 0.94);
      bot.hitAvailable = true;
      bot.nextHitAt = ball.start + ball.duration * t + randomRange(-30, 30);
      bot.willMisAim = Math.random() < 0.15;
      bot.aimBias = randomRange(-0.035, 0.035);
      bot.history.length = 0;
    }

    function getBallPose(now) {
      const ball = gameState.ball;
      if (!ball.active) {
        return {
          t: 0,
          x: ball.x,
          z: ball.z,
          y: ball.y,
          lift: ball.y,
          shadowScale: 1 - clamp(ball.y / 260, 0, 0.52)
        };
      }

      const t = clamp((now - ball.start) / ball.duration, 0, 1);
      const spinCurve = ball.sideSpin * Math.sin(t * Math.PI) * 0.16;
      const x = lerp(ball.fromX, ball.toX, t) + spinCurve;
      const z = lerp(ball.fromZ, ball.toZ, t);
      const bounceZ = ball.direction > 0 ? 0.64 : 0.36;
      const bounceT = clamp((bounceZ - ball.fromZ) / (ball.toZ - ball.fromZ), 0.22, 0.78);
      let y;

      if (t <= bounceT) {
        const beforeBounce = t / bounceT;
        const startHeight = 22;
        y = (1 - beforeBounce) * startHeight + Math.sin(beforeBounce * Math.PI) * ball.arc;
      } else {
        const afterBounce = (t - bounceT) / (1 - bounceT);
        const spinLift = ball.spin * 34 * afterBounce;
        const endHeight = 24;
        const bounceArc = ball.arc * lerp(0.46, 0.34, afterBounce) + spinLift;
        y = Math.sin(afterBounce * Math.PI) * bounceArc + afterBounce * endHeight;
      }

      y = Math.max(0, y);

      return {
        t,
        x,
        z,
        y,
        lift: y,
        shadowScale: 1 - clamp(y / 260, 0, 0.52)
      };
    }

    function detectHand(now) {
      if (!gameState.handLandmarker || video.readyState < 2 || video.currentTime === gameState.lastVideoTime) {
        return;
      }

      gameState.lastVideoTime = video.currentTime;
      const result = gameState.handLandmarker.detectForVideo(video, now);
      if (!result.landmarks || result.landmarks.length === 0) {
        return;
      }

      let handIndex = 0;
      if (result.handednesses) {
        const rightIndex = result.handednesses.findIndex((handedness) => {
          const label = handedness?.[0]?.categoryName || handedness?.[0]?.displayName;
          return label === "Right";
        });
        if (rightIndex !== -1) {
          handIndex = rightIndex;
        }
      }

      const landmarks = result.landmarks[handIndex];
      const wrist = landmarks[0];
      const middleBase = landmarks[9] || wrist;
      const indexBase = landmarks[5] || middleBase;
      const pinkyBase = landmarks[17] || middleBase;
      const palmX = (wrist.x + middleBase.x + indexBase.x + pinkyBase.x) * 0.25;
      const palmY = (wrist.y + middleBase.y + indexBase.y + pinkyBase.y) * 0.25;
      const mirroredX = 1 - palmX;

      if (gameState.inputMode === "hand") {
        gameState.player.targetX = clamp((mirroredX - 0.5) * 2.22, -0.82, 0.82);
        gameState.player.targetZ = clamp(0.045 + (1 - palmY) * 0.19, 0.035, 0.235);
      }
      gameState.handReady = true;
      gameState.handSeenAt = now;
    }

    function updatePlayer(dt) {
      const player = gameState.player;
      const oldX = player.x;
      const oldZ = player.z;
      const smoothing = frameLerp(0.2, dt);

      player.targetX = clamp(player.targetX, -0.82, 0.82);
      player.targetZ = clamp(player.targetZ, 0.035, 0.235);
      player.x = clamp(lerp(player.x, player.targetX, smoothing), -0.82, 0.82);
      player.z = clamp(lerp(player.z, player.targetZ, smoothing), 0.035, 0.235);
      player.vx = (player.x - oldX) / Math.max(dt, 0.001);
      player.vz = (player.z - oldZ) / Math.max(dt, 0.001);
      player.prevX = oldX;
      player.prevZ = oldZ;

      gameState.hitFlash = Math.max(0, gameState.hitFlash - dt * 5.4);
      gameState.bot.flash = Math.max(0, gameState.bot.flash - dt * 4.2);
      gameState.netFlash = Math.max(0, gameState.netFlash - dt * 6);
    }

    function updateBot(dt, pose, now) {
      const bot = gameState.bot;
      const totalPoints = gameState.score.player + gameState.score.bot;
      const difficultySteps = Math.floor(totalPoints / 5);
      const swingAge = now - bot.swingStartedAt;
      const swingAmount = swingAge < bot.swingDuration ? Math.sin((swingAge / bot.swingDuration) * Math.PI) : 0;

      bot.lerpFactor = Math.min(0.15, 0.08 + difficultySteps * 0.012);
      bot.z = bot.baseZ - swingAmount * 0.075;

      if (gameState.phase === "rally" && gameState.ball.direction > 0) {
        bot.history.push({ time: now, x: pose.x });
        while (bot.history.length > 0 && now - bot.history[0].time > 900) {
          bot.history.shift();
        }

        const delayedTime = now - bot.reactionDelay;
        let observed = null;
        for (const sample of bot.history) {
          if (sample.time <= delayedTime) {
            observed = sample;
          } else {
            break;
          }
        }

        bot.targetX = observed ? clamp(observed.x + bot.aimBias, -0.78, 0.78) : bot.targetX;
      } else if (gameState.phase === "bot-serve") {
        bot.targetX = 0;
      } else if (gameState.phase === "player-serve") {
        bot.targetX = clamp(gameState.player.x * 0.18, -0.4, 0.4);
      } else {
        bot.targetX = lerp(bot.targetX, 0, 0.025);
      }

      bot.x = clamp(lerp(bot.x, bot.targetX, frameLerp(bot.lerpFactor, dt)), -0.82, 0.82);
    }

    function updateBall(now) {
      const ball = gameState.ball;
      const pose = getBallPose(now);

      ball.x = pose.x;
      ball.y = pose.y;
      ball.z = pose.z;

      if (!ball.hasBounced) {
        const bounceZ = ball.direction > 0 ? 0.64 : 0.36;
        const crossed = ball.direction > 0 ? pose.z >= bounceZ : pose.z <= bounceZ;
        if (crossed) {
          ball.hasBounced = true;
          gameState.netFlash = 1;
          playTableBounceSound();
        }
      }

      if (ball.direction < 0 && ball.hitWindowOpen && pose.z < 0.15) {
        const ballPoint = tablePoint(pose.x, pose.z);
        const paddlePoint = tablePoint(gameState.player.x, gameState.player.z);
        const distance = Math.hypot(ballPoint.x - paddlePoint.x, ballPoint.y - paddlePoint.y);

        if (distance <= 80 && controlIsReady(performance.now())) {
          playerHit(pose, distance);
          return;
        } else if (pose.z < 0.055) {
          ball.hitWindowOpen = false;
        }
      }

      if (ball.direction > 0 && gameState.bot.hitAvailable && now >= gameState.bot.nextHitAt && pose.z > 0.82) {
        const ballPoint = tablePoint(pose.x, pose.z);
        const paddlePoint = tablePoint(gameState.bot.x, gameState.bot.z);
        const distance = Math.hypot(ballPoint.x - paddlePoint.x, ballPoint.y - paddlePoint.y);

        gameState.bot.hitAvailable = false;
        if (distance <= 92) {
          botHit(pose);
          return;
        }
      }

      if (pose.t >= 1) {
        if (ball.direction < 0) {
          scorePoint("bot", now, pose);
        } else {
          scorePoint("player", now, pose);
        }
      }
    }

    function scorePoint(winner, now, pose) {
      gameState.score[winner] += 1;
      gameState.phase = "point-freeze";
      gameState.freezeUntil = now + 200;
      gameState.pendingGameWinner = getGameWinner();
      gameState.server = gameState.server === "player" ? "bot" : "player";
      gameState.scorePulseSide = winner;
      gameState.scorePulseStartedAt = performance.now();
      gameState.bot.hitAvailable = false;
      gameState.stats.pointsPlayed += 1;
      gameState.stats.longestRally = Math.max(gameState.stats.longestRally, gameState.rally);
      playPointSound();

      gameState.ball.active = false;
      gameState.ball.x = pose.x;
      gameState.ball.y = pose.y;
      gameState.ball.z = pose.z;
      gameState.ballTrail.length = 0;
    }

    function getGameWinner() {
      const { player, bot } = gameState.score;
      if (Math.max(player, bot) >= 11 && Math.abs(player - bot) >= 2) {
        return player > bot ? "player" : "bot";
      }
      return null;
    }

    function finishPoint(now) {
      if (gameState.pendingGameWinner) {
        gameState.winner = gameState.pendingGameWinner;
        gameState.phase = "game-over";
        gameState.gameOverStartedAt = performance.now();
        gameState.pendingGameWinner = null;
        if (gameState.winner === "player") {
          playWinSound();
        }
        return;
      }

      startServe(gameState.server, now);
    }

    function updatePlayerServe(now) {
      const player = gameState.player;
      const handSpeed = Math.hypot(player.vx * 0.85, player.vz * 2.2);

      gameState.ball.x = player.x;
      gameState.ball.z = player.z;
      gameState.ball.y = 24;
      gameState.ball.fromX = player.x;
      gameState.ball.fromZ = player.z;
      gameState.ball.toX = player.x;
      gameState.ball.toZ = player.z;

      if (now - gameState.serveStartedAt < 250 || !controlIsReady(performance.now())) {
        return;
      }

      if (player.vz > 0.35 || (player.vz > 0.14 && handSpeed > 0.58)) {
        gameState.rally = 0;
        gameState.hitFlash = 1;
        player.pulseStartedAt = now;
        playBallHitSound();
        triggerScreenShake(handSpeed);
        launchBall({
          fromX: player.x,
          fromZ: player.z,
          toX: clamp(player.x + player.vx * 0.075, -0.74, 0.74),
          toZ: 1.06,
          direction: 1,
          power: clamp(handSpeed, 0.2, 1.4),
          spin: clamp(player.vz * 0.85, -0.6, 1.1),
          sideSpin: clamp(player.vx * 0.08, -0.55, 0.55)
        });
      }
    }

    function updateBotServe(now) {
      const elapsed = now - gameState.serveStartedAt;
      const tossT = clamp(elapsed / 1500, 0, 1);
      const tossLift = Math.sin(tossT * Math.PI) * 46;

      gameState.ball.x = gameState.bot.x;
      gameState.ball.z = gameState.bot.baseZ - 0.025;
      gameState.ball.y = 24 + tossLift;
      gameState.ball.fromX = gameState.ball.x;
      gameState.ball.fromZ = gameState.ball.z;
      gameState.ball.toX = gameState.ball.x;
      gameState.ball.toZ = gameState.ball.z;

      if (now >= gameState.botServeAt) {
        gameState.bot.flash = 1;
        gameState.bot.swingStartedAt = now;
        gameState.bot.pulseStartedAt = now;
        playBallHitSound();
        launchBall({
          fromX: gameState.bot.x,
          fromZ: gameState.bot.baseZ - 0.025,
          toX: clamp(gameState.player.x * 0.32 + randomRange(-0.12, 0.12), -0.65, 0.65),
          toZ: -0.08,
          direction: -1,
          power: 0.22,
          spin: randomRange(-0.18, 0.28),
          sideSpin: randomRange(-0.18, 0.18)
        });
      }
    }

    function showHitFeedback(text, pose) {
      gameState.feedback = {
        text,
        startedAt: performance.now(),
        x: pose.x,
        z: Math.max(0.09, pose.z)
      };
    }

    function playerHit(pose, distance = 80) {
      const player = gameState.player;
      const handSpeed = Math.hypot(player.vx * 0.8, player.vz * 2.4);
      const quality = distance < 30 ? "PERFECT" : distance < 58 ? "NICE" : "REACH";
      const qualityBoost = quality === "PERFECT" ? 0.24 : quality === "NICE" ? 0.1 : -0.04;
      const swipe = clamp(player.vx * 0.09, -0.55, 0.55);
      const depthDrive = clamp(player.vz * 0.08, -0.04, 0.08);
      const targetX = pose.x + swipe + player.x * 0.18;
      const targetZ = 1.08 + depthDrive;
      const spin = clamp(player.vz * 0.8 + handSpeed * 0.06, -1, 1.25);

      gameState.rally += 1;
      gameState.stats.playerHits += 1;
      gameState.stats.longestRally = Math.max(gameState.stats.longestRally, gameState.rally);
      if (quality === "PERFECT") {
        gameState.stats.perfectHits += 1;
      }
      gameState.hitFlash = 1;
      player.pulseStartedAt = performance.now();
      showHitFeedback(quality, pose);
      playBallHitSound();
      triggerScreenShake(handSpeed);
      launchBall({
        fromX: pose.x,
        fromZ: pose.z,
        toX: targetX,
        toZ: targetZ,
        direction: 1,
        power: clamp(handSpeed + qualityBoost, 0, 1.8),
        spin,
        sideSpin: clamp(player.vx * 0.1, -0.7, 0.7)
      });
    }

    function botHit(pose) {
      const bot = gameState.bot;
      const miss = bot.willMisAim ? randomRange(-0.26, 0.26) : randomRange(-0.055, 0.055);
      const returnAngle = clamp((bot.x - pose.x) * 0.36 + miss, -0.42, 0.42);
      const targetX = clamp(gameState.player.x * 0.52 + returnAngle, -0.78, 0.78);
      const targetZ = -0.08 - Math.random() * 0.035;

      gameState.rally += 1;
      gameState.stats.botHits += 1;
      gameState.stats.longestRally = Math.max(gameState.stats.longestRally, gameState.rally);
      bot.flash = 1;
      bot.swingStartedAt = performance.now();
      bot.pulseStartedAt = bot.swingStartedAt;
      playBallHitSound();
      triggerScreenShake(1);
      launchBall({
        fromX: pose.x,
        fromZ: pose.z,
        toX: targetX,
        toZ: targetZ,
        direction: -1,
        power: 0.46 + Math.random() * 0.24 + gameState.rally * 0.025,
        spin: (Math.random() - 0.42) * 0.9,
        sideSpin: returnAngle * 1.3
      });
    }

    function activeGameplayPhase() {
      return gameState.phase === "player-serve" ||
        gameState.phase === "bot-serve" ||
        gameState.phase === "rally" ||
        gameState.phase === "point-freeze";
    }

    function beginCountdown(now) {
      gameState.phase = "countdown";
      gameState.countdownStartedAt = now;
      gameState.message = "Hand Detected";
    }

    function beginMatch() {
      resetMatch(0);
    }

    function beginMouseMode() {
      gameState.inputMode = "mouse";
      gameState.mode = "playing";
      gameState.phase = "player-serve";
      gameState.pausedForHand = false;
      gameState.message = "";
      resetMatch(0);
    }

    function screenToPlayerTarget(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const x = clientX - rect.left;
      const y = clientY - rect.top;
      const z = clamp((gameState.table.bottomY - y) / (gameState.table.height * 0.82), 0.035, 0.235);
      const xNorm = clamp((x - gameState.table.cx) / (tableWidthAt(z) * 0.5), -0.82, 0.82);
      return { x: xNorm, z };
    }

    function updateMouseTarget(event) {
      if (!gameState.table) {
        return;
      }

      const target = screenToPlayerTarget(event.clientX, event.clientY);
      gameState.mouse.active = true;
      gameState.mouse.x = target.x;
      gameState.mouse.z = target.z;

      if (gameState.inputMode === "mouse") {
        gameState.player.targetX = target.x;
        gameState.player.targetZ = target.z;
      }
    }

    function mouseServe() {
      if (gameState.inputMode !== "mouse" || gameState.phase !== "player-serve") {
        return;
      }

      gameState.rally = 0;
      gameState.hitFlash = 1;
      gameState.player.pulseStartedAt = performance.now();
      playBallHitSound();
      launchBall({
        fromX: gameState.player.x,
        fromZ: gameState.player.z,
        toX: clamp(gameState.player.x * 0.55, -0.68, 0.68),
        toZ: 1.06,
        direction: 1,
        power: 0.62,
        spin: 0.35,
        sideSpin: clamp(gameState.player.vx * 0.08, -0.35, 0.35)
      });
    }

    function update(now) {
      const dt = Math.min((now - gameState.time) / 1000, 1 / 30);
      gameState.time = now;
      gameState.renderTime = now;

      if (gameState.mode === "loading" || gameState.mode === "error") {
        return;
      }

      detectHand(now);

      if (gameState.mode === "intro") {
        if (gameState.inputMode === "mouse") {
          beginMatch();
          return;
        }

        if (handIsFresh(now)) {
          if (gameState.phase !== "countdown") {
            beginCountdown(now);
          } else if (now - gameState.countdownStartedAt >= 1500) {
            beginMatch();
          }
        } else {
          gameState.phase = "waiting-hand";
          gameState.countdownStartedAt = 0;
          gameState.message = "Show your right hand to the camera to play";
        }
        return;
      }

      if (gameState.mode !== "playing") {
        return;
      }

      if (activeGameplayPhase() && !controlIsReady(now)) {
        gameState.pausedForHand = true;
        if (!gameState.handLostAt) {
          gameState.handLostAt = now;
        }
        return;
      }

      if (gameState.pausedForHand && handIsFresh(now)) {
        gameState.pausedForHand = false;
        gameState.handLostAt = 0;
      }

      gameState.simTime += dt * 1000;
      const simNow = gameState.simTime;

      if (gameState.phase === "point-freeze") {
        if (simNow >= gameState.freezeUntil) {
          finishPoint(simNow);
        }
        return;
      }

      updatePlayer(dt);
      const pose = getBallPose(simNow);
      updateBot(dt, pose, simNow);

      if (gameState.phase === "game-over") {
        return;
      }

      if (gameState.phase === "player-serve") {
        updatePlayerServe(simNow);
      } else if (gameState.phase === "bot-serve") {
        updateBotServe(simNow);
      } else if (gameState.phase === "rally") {
        updateBall(simNow);
      }
    }

    function roundedRect(x, y, width, height, radius) {
      const r = Math.min(radius, width * 0.5, height * 0.5);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + width - r, y);
      ctx.quadraticCurveTo(x + width, y, x + width, y + r);
      ctx.lineTo(x + width, y + height - r);
      ctx.quadraticCurveTo(x + width, y + height, x + width - r, y + height);
      ctx.lineTo(x + r, y + height);
      ctx.quadraticCurveTo(x, y + height, x, y + height - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function pulseScale(startedAt, duration = 80, amount = 0.15) {
      const t = (performance.now() - startedAt) / duration;
      if (t < 0 || t > 1) {
        return 1;
      }
      return 1 + Math.sin(t * Math.PI) * amount;
    }

    function drawBackground() {
      const w = window.innerWidth;
      const h = window.innerHeight;

      if (backgroundImage.complete && backgroundImage.naturalWidth > 0) {
        const scale = Math.max(w / backgroundImage.naturalWidth, h / backgroundImage.naturalHeight);
        const imageW = backgroundImage.naturalWidth * scale;
        const imageH = backgroundImage.naturalHeight * scale;
        const imageX = (w - imageW) * 0.5;
        const imageY = (h - imageH) * 0.5;
        ctx.drawImage(backgroundImage, imageX, imageY, imageW, imageH);
      } else {
        ctx.fillStyle = "#0a0a12";
        ctx.fillRect(0, 0, w, h);
      }

      ctx.fillStyle = "rgba(10, 10, 18, 0.32)";
      ctx.fillRect(0, 0, w, h);
    }

    function drawTable() {
      const table = gameState.table;

      ctx.save();
      ctx.fillStyle = "rgba(0, 0, 0, 0.46)";
      ctx.beginPath();
      ctx.ellipse(table.cx, table.bottomY - table.height * 0.05, table.bottomWidth * 0.58, table.height * 0.16, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      ctx.save();
      makeTablePath(0.08);
      const wood = ctx.createLinearGradient(0, table.topY, 0, table.bottomY);
      wood.addColorStop(0, "#a87337");
      wood.addColorStop(0.48, "#8a572b");
      wood.addColorStop(1, "#6f421f");
      ctx.fillStyle = wood;
      ctx.fill();
      ctx.clip();

      for (let i = 0; i < 8; i += 1) {
        const z = 0.08 + i * 0.12;
        const p1 = tablePoint(-1.1, z);
        const p2 = tablePoint(1.1, z + 0.015);
        ctx.strokeStyle = i % 2 === 0 ? "rgba(255, 218, 161, 0.18)" : "rgba(46, 24, 10, 0.22)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.stroke();
      }
      ctx.restore();

      ctx.save();
      makeTablePath();
      const felt = ctx.createLinearGradient(0, table.topY, 0, table.bottomY);
      felt.addColorStop(0, "#367a36");
      felt.addColorStop(0.42, "#2d6a2d");
      felt.addColorStop(1, "#255b25");
      ctx.fillStyle = felt;
      ctx.fill();
      ctx.restore();

      drawTableLine(-1, 0, -1, 1, 5);
      drawTableLine(1, 0, 1, 1, 5);
      drawTableLine(-1, 0, 1, 0, 5);
      drawTableLine(-1, 1, 1, 1, 5);
      drawTableLine(0, 0, 0, 1, 3);

      const netLeft = tablePoint(-1.03, 0.5);
      const netRight = tablePoint(1.03, 0.5);
      ctx.save();
      ctx.lineCap = "round";
      ctx.strokeStyle = "rgba(0, 0, 0, 0.36)";
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(netLeft.x, netLeft.y + 3);
      ctx.lineTo(netRight.x, netRight.y + 3);
      ctx.stroke();
      ctx.strokeStyle = gameState.netFlash > 0 ? `rgba(255, 255, 255, ${0.72 + gameState.netFlash * 0.25})` : "rgba(255, 255, 255, 0.86)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(netLeft.x, netLeft.y - 1);
      ctx.lineTo(netRight.x, netRight.y - 1);
      ctx.stroke();
      ctx.restore();
    }

    function makeTablePath(expand = 0) {
      const topLeft = tablePoint(-1 - expand, 1);
      const topRight = tablePoint(1 + expand, 1);
      const bottomRight = tablePoint(1 + expand, 0);
      const bottomLeft = tablePoint(-1 - expand, 0);
      ctx.beginPath();
      ctx.moveTo(topLeft.x, topLeft.y);
      ctx.lineTo(topRight.x, topRight.y);
      ctx.lineTo(bottomRight.x, bottomRight.y);
      ctx.lineTo(bottomLeft.x, bottomLeft.y);
      ctx.closePath();
    }

    function drawTableLine(x1, z1, x2, z2, width) {
      const a = tablePoint(x1, z1);
      const b = tablePoint(x2, z2);
      ctx.save();
      ctx.strokeStyle = "rgba(255, 255, 255, 0.94)";
      ctx.lineWidth = width;
      ctx.lineCap = "round";
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
      ctx.restore();
    }

    function drawPaddle(paddle, isBot = false) {
      const point = tablePoint(paddle.x, paddle.z);
      const faceWidth = isBot ? 70 : 86;
      const faceHeight = isBot ? 24 : 32;
      const handleWidth = isBot ? 15 : 18;
      const handleHeight = isBot ? 30 : 38;
      const pulse = pulseScale(paddle.pulseStartedAt);
      const yScale = isBot ? 0.78 : 0.9;
      const handleY = isBot ? -faceHeight * 0.5 - handleHeight + 4 : faceHeight * 0.5 - 4;

      ctx.save();
      ctx.translate(point.x, point.y);
      ctx.scale(pulse, pulse * yScale);
      ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
      ctx.shadowBlur = 0;
      ctx.shadowOffsetY = isBot ? 4 : 7;

      ctx.fillStyle = "#25201c";
      roundedRect(-handleWidth * 0.5, handleY, handleWidth, handleHeight, 5);
      ctx.fill();

      ctx.fillStyle = "#b82124";
      roundedRect(-faceWidth * 0.5, -faceHeight * 0.5, faceWidth, faceHeight, 9);
      ctx.fill();

      ctx.shadowColor = "transparent";
      ctx.strokeStyle = "rgba(255, 255, 255, 0.26)";
      ctx.lineWidth = 2;
      ctx.stroke();

      if ((isBot ? gameState.bot.flash : gameState.hitFlash) > 0) {
        ctx.globalAlpha = (isBot ? gameState.bot.flash : gameState.hitFlash) * 0.42;
        ctx.fillStyle = "rgba(255, 255, 255, 0.88)";
        roundedRect(-faceWidth * 0.5, -faceHeight * 0.5, faceWidth, faceHeight, 9);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawBall(now) {
      const pose = getBallPose(now);
      const ground = tablePoint(pose.x, pose.z);
      const ballY = ground.y - pose.lift;
      const perspectiveScale = lerp(1.15, 0.74, clamp(pose.z, 0, 1));
      const radius = gameState.ball.radius * perspectiveScale;

      if (gameState.ball.active && gameState.phase === "rally" && !gameState.pausedForHand) {
        gameState.ballTrail.push({ x: ground.x, y: ballY, r: radius });
        if (gameState.ballTrail.length > 4) {
          gameState.ballTrail.shift();
        }
      }

      ctx.save();
      for (let i = 0; i < gameState.ballTrail.length; i += 1) {
        const mark = gameState.ballTrail[i];
        const alpha = (i + 1) / (gameState.ballTrail.length + 1);
        ctx.globalAlpha = alpha * 0.28;
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.arc(mark.x, mark.y, Math.max(2, mark.r * (0.42 + alpha * 0.25)), 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      ctx.save();
      ctx.globalAlpha = 0.42;
      ctx.fillStyle = "rgba(0, 0, 0, 0.78)";
      ctx.beginPath();
      ctx.ellipse(ground.x + 4, ground.y + 5, radius * 1.2 * pose.shadowScale, radius * 0.38 * pose.shadowScale, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      ctx.save();
      ctx.fillStyle = "#ffffff";
      ctx.beginPath();
      ctx.arc(ground.x, ballY, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(0, 0, 0, 0.12)";
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();
    }

    function drawLandingMarker() {
      if (!gameState.ball?.active || gameState.phase !== "rally") {
        return;
      }

      const markerZ = clamp(gameState.ball.toZ, 0.08, 0.92);
      const marker = tablePoint(gameState.ball.toX, markerZ);
      const pulse = 0.5 + Math.sin(performance.now() * 0.012) * 0.5;

      ctx.save();
      ctx.globalAlpha = 0.22 + pulse * 0.1;
      ctx.strokeStyle = "#ffffff";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(marker.x, marker.y, 18, 7, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }

    function drawHitFeedback() {
      const elapsed = performance.now() - gameState.feedback.startedAt;
      if (!gameState.feedback.text || elapsed < 0 || elapsed > 520) {
        return;
      }

      const point = tablePoint(gameState.feedback.x, gameState.feedback.z);
      const alpha = 1 - elapsed / 520;

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = gameState.feedback.text === "PERFECT" ? "#34d178" : "#ffffff";
      ctx.shadowColor = "rgba(0, 0, 0, 0.48)";
      ctx.shadowBlur = 8;
      ctx.font = "900 20px Nunito, Arial, Helvetica, sans-serif";
      ctx.fillText(gameState.feedback.text, point.x, point.y - 44 - elapsed * 0.035);
      ctx.restore();
    }

    function drawHud() {
      ctx.save();
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      const cx = window.innerWidth * 0.5;
      const top = 54;
      drawScoreNumber(String(gameState.score.player), cx - 70, top, gameState.scorePulseSide === "player");
      drawScoreNumber(String(gameState.score.bot), cx + 70, top, gameState.scorePulseSide === "bot");

      ctx.fillStyle = "rgba(255, 255, 255, 0.42)";
      ctx.shadowColor = "rgba(0, 0, 0, 0.42)";
      ctx.shadowBlur = 8;
      ctx.font = "900 30px Nunito, Arial, Helvetica, sans-serif";
      ctx.fillText("-", cx, top - 2);
      ctx.shadowBlur = 0;

      ctx.fillStyle = "rgba(255, 255, 255, 0.58)";
      ctx.font = "800 11px Nunito, Arial, Helvetica, sans-serif";
      ctx.fillText("PLAYER", cx - 68, top + 38);
      ctx.fillText("BOT", cx + 68, top + 38);

      ctx.fillStyle = "rgba(255, 255, 255, 0.86)";
      ctx.font = "800 13px Nunito, Arial, Helvetica, sans-serif";
      if (gameState.pausedForHand) {
        // Pause overlay owns the hand-lost message.
      } else if (gameState.inputMode === "hand" && !gameState.handReady && gameState.mode === "playing") {
        ctx.fillText("Show your right hand to control the paddle", cx, 112);
      } else if (gameState.inputMode === "hand" && gameState.handReady && performance.now() - gameState.handSeenAt > 700) {
        ctx.fillText("Right hand lost", cx, 112);
      } else if (gameState.inputMode === "mouse" && gameState.phase === "player-serve") {
        ctx.fillText("Move mouse to aim • click to serve", cx, 112);
      } else if (gameState.phase === "player-serve") {
        ctx.fillText("Swing forward to serve", cx, 112);
      } else if (gameState.phase === "bot-serve") {
        ctx.fillText("Bot serving", cx, 112);
      }

      ctx.globalAlpha = 0.7;
      ctx.fillText(`Rally ${gameState.rally}  •  Best ${gameState.stats.longestRally}`, cx, window.innerHeight - 32);
      ctx.restore();
    }

    function drawPauseOverlay() {
      if (!gameState.pausedForHand) {
        return;
      }

      const cx = window.innerWidth * 0.5;
      const cy = window.innerHeight * 0.5;
      ctx.save();
      ctx.fillStyle = "rgba(10, 10, 18, 0.62)";
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = "#ffffff";
      ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
      ctx.shadowBlur = 12;
      ctx.font = "900 34px Nunito, Arial, Helvetica, sans-serif";
      ctx.fillText("✋ Show your hand to resume", cx, cy);
      ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
      ctx.shadowBlur = 0;
      ctx.font = "800 15px Nunito, Arial, Helvetica, sans-serif";
      ctx.fillText("Keep your right hand in view of the camera", cx, cy + 44);
      ctx.restore();
    }

    function drawScoreNumber(text, x, y, isPulsing) {
      const elapsed = performance.now() - gameState.scorePulseStartedAt;
      const active = isPulsing && elapsed >= 0 && elapsed < 260;
      const t = active ? elapsed / 260 : 1;
      const scale = active ? 1 + Math.sin(t * Math.PI) * 0.22 : 1;
      const lift = active ? -Math.sin(t * Math.PI) * 8 : 0;

      ctx.save();
      ctx.translate(x, y + lift);
      ctx.scale(scale, scale);
      ctx.fillStyle = "#ffffff";
      ctx.shadowColor = "rgba(0, 0, 0, 0.62)";
      ctx.shadowBlur = 9;
      ctx.shadowOffsetY = 3;
      ctx.font = "900 56px Nunito, Arial, Helvetica, sans-serif";
      ctx.fillText(text, 0, 0);
      ctx.restore();
    }

    function drawGameOver() {
      if (gameState.phase !== "game-over") {
        return;
      }

      const fade = clamp((performance.now() - gameState.gameOverStartedAt) / 320, 0, 1);
      const cx = window.innerWidth * 0.5;
      const cy = window.innerHeight * 0.5;
      const cardW = Math.min(430, window.innerWidth - 48);
      const cardH = 252;
      const cardX = cx - cardW * 0.5;
      const cardY = cy - cardH * 0.5;
      const buttonW = 178;
      const buttonH = 48;
      const buttonX = cx - buttonW * 0.5;
      const buttonY = cardY + cardH - 72;

      gameState.playAgainButton = { x: buttonX, y: buttonY, w: buttonW, h: buttonH };

      ctx.save();
      ctx.globalAlpha = fade;
      ctx.fillStyle = "rgba(10, 10, 18, 0.72)";
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);

      ctx.shadowColor = "rgba(0, 0, 0, 0.42)";
      ctx.shadowBlur = 22;
      ctx.shadowOffsetY = 12;
      ctx.fillStyle = "rgba(248, 251, 255, 0.96)";
      roundedRect(cardX, cardY, cardW, cardH, 30);
      ctx.fill();

      ctx.shadowBlur = 0;
      ctx.shadowOffsetY = 0;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = gameState.winner === "player" ? "#2f72d2" : "#5d667a";
      ctx.font = "900 58px Nunito, Arial, Helvetica, sans-serif";
      ctx.fillText(gameState.winner === "player" ? "YOU WIN" : "YOU LOSE", cx, cardY + 78);
      ctx.fillStyle = "#242a33";
      ctx.font = "900 24px Nunito, Arial, Helvetica, sans-serif";
      ctx.fillText(`${gameState.score.player} - ${gameState.score.bot}`, cx, cardY + 124);
      ctx.fillStyle = "rgba(36, 42, 51, 0.72)";
      ctx.font = "800 15px Nunito, Arial, Helvetica, sans-serif";
      ctx.fillText(`Best rally ${gameState.stats.longestRally}  •  Perfect hits ${gameState.stats.perfectHits}`, cx, cardY + 154);

      ctx.fillStyle = "#2f72d2";
      roundedRect(buttonX, buttonY, buttonW, buttonH, 24);
      ctx.fill();
      ctx.fillStyle = "#ffffff";
      ctx.font = "900 20px Nunito, Arial, Helvetica, sans-serif";
      ctx.fillText("Play Again", cx, buttonY + buttonH * 0.5 + 1);
      ctx.restore();
    }

    function resetMatch(now = 0) {
      gameState.mode = "playing";
      gameState.simTime = now;
      gameState.score = { player: 0, bot: 0 };
      gameState.rally = 0;
      gameState.feedback.text = "";
      gameState.feedback.startedAt = -Infinity;
      gameState.stats = {
        playerHits: 0,
        botHits: 0,
        perfectHits: 0,
        longestRally: 0,
        pointsPlayed: 0
      };
      gameState.server = "player";
      gameState.pendingGameWinner = null;
      gameState.winner = null;
      gameState.gameOverStartedAt = 0;
      gameState.scorePulseSide = null;
      gameState.scorePulseStartedAt = -Infinity;
      gameState.pausedForHand = false;
      gameState.handLostAt = 0;
      gameState.ballTrail.length = 0;
      gameState.bot.history.length = 0;
      gameState.bot.targetX = 0;
      gameState.bot.aimBias = 0;
      gameState.bot.hitAvailable = false;
      startServe("player", now);
    }

    function handleInput(type, event) {
      ensureAudio();
      let pointerX = 0;
      let pointerY = 0;

      if (type === "key" && (event.key === "m" || event.key === "M")) {
        gameState.inputMode = gameState.inputMode === "mouse" ? "hand" : "mouse";
        if (gameState.inputMode === "mouse" && gameState.mode !== "playing") {
          beginMouseMode();
        }
        return;
      }

      if (type === "pointer") {
        updateMouseTarget(event);
        const button = gameState.mouseButton;
        const rect = canvas.getBoundingClientRect();
        pointerX = event.clientX - rect.left;
        pointerY = event.clientY - rect.top;
        const mouseButtonHit = pointerX >= button.x && pointerX <= button.x + button.w && pointerY >= button.y && pointerY <= button.y + button.h;

        if ((gameState.mode === "intro" || gameState.mode === "error" || gameState.mode === "loading") && mouseButtonHit) {
          beginMouseMode();
          return;
        }

        if (gameState.inputMode === "mouse") {
          mouseServe();
        }
      }

      if (gameState.phase !== "game-over") {
        return;
      }

      if (type === "key") {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          resetMatch(0);
        }
        return;
      }

      const button = gameState.playAgainButton;
      const insideButton = pointerX >= button.x && pointerX <= button.x + button.w && pointerY >= button.y && pointerY <= button.y + button.h;

      if (insideButton) {
        resetMatch(0);
      }
    }

    function handlePointerDown(event) {
      handleInput("pointer", event);
    }

    function handlePointerMove(event) {
      updateMouseTarget(event);
    }

    function handleKeyDown(event) {
      handleInput("key", event);
    }

    function drawMouseModeButton(cx, y) {
      const w = 226;
      const h = 44;
      const x = cx - w * 0.5;

      gameState.mouseButton = { x, y, w, h };
      ctx.save();
      ctx.fillStyle = "rgba(255, 255, 255, 0.12)";
      roundedRect(x, y, w, h, 22);
      ctx.fill();
      ctx.strokeStyle = "rgba(255, 255, 255, 0.28)";
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.fillStyle = "#ffffff";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.font = "900 16px Nunito, Arial, Helvetica, sans-serif";
      ctx.fillText("Play with Mouse", cx, y + h * 0.5 + 1);
      ctx.restore();
    }

    function drawStartup() {
      ctx.save();
      drawBackground();

      const cx = window.innerWidth * 0.5;
      const cy = window.innerHeight * 0.5;
      const now = performance.now();
      const pulse = 0.5 + Math.sin(now * 0.006) * 0.5;

      ctx.fillStyle = "rgba(0, 0, 0, 0.34)";
      ctx.beginPath();
      ctx.ellipse(cx, cy + 174, Math.min(330, window.innerWidth * 0.38), 44, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.shadowColor = "rgba(0, 0, 0, 0.62)";
      ctx.shadowBlur = 16;
      ctx.fillStyle = "#ffffff";
      ctx.font = `900 ${Math.min(56, Math.max(34, window.innerWidth * 0.085))}px Nunito, Arial, Helvetica, sans-serif`;
      ctx.fillText("🏓 WII PING PONG", cx, cy - 114);

      ctx.shadowBlur = 0;
      ctx.fillStyle = "rgba(255, 255, 255, 0.78)";
      ctx.font = "800 18px Nunito, Arial, Helvetica, sans-serif";
      ctx.fillText("Show your right hand to the camera to play", cx, cy - 60);

      if (gameState.mode === "error") {
        ctx.fillStyle = "#ffffff";
        ctx.font = "900 25px Nunito, Arial, Helvetica, sans-serif";
        ctx.fillText(gameState.errorTitle || "Camera unavailable", cx, cy + 20);
        ctx.fillStyle = "rgba(255, 255, 255, 0.72)";
        ctx.font = "800 15px Nunito, Arial, Helvetica, sans-serif";
        ctx.fillText(gameState.errorDetail || "Allow camera access and reload this page.", cx, cy + 58);
        drawMouseModeButton(cx, cy + 94);
        ctx.restore();
        return;
      }

      const handScale = 1 + pulse * 0.08;
      ctx.save();
      ctx.translate(cx, cy + 10);
      ctx.scale(handScale, handScale);
      ctx.fillStyle = handIsFresh(now) ? "#34d178" : "rgba(255, 255, 255, 0.92)";
      ctx.font = "900 54px Nunito, Arial, Helvetica, sans-serif";
      ctx.fillText("✋", 0, 0);
      ctx.restore();

      if (gameState.mode === "loading") {
        ctx.strokeStyle = `rgba(255, 255, 255, ${0.2 + pulse * 0.36})`;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(cx, cy + 82, 20, -Math.PI * 0.5, Math.PI * (1.1 + pulse * 0.7));
        ctx.stroke();
        ctx.fillStyle = "rgba(255, 255, 255, 0.72)";
        ctx.font = "900 18px Nunito, Arial, Helvetica, sans-serif";
        ctx.fillText(gameState.message, cx, cy + 126);
        ctx.restore();
        return;
      }

      if (gameState.phase === "countdown") {
        const elapsed = now - gameState.countdownStartedAt;
        const countdown = elapsed < 375 ? "3" : elapsed < 750 ? "2" : elapsed < 1125 ? "1" : "GO!";
        ctx.fillStyle = "#34d178";
        ctx.font = "900 19px Nunito, Arial, Helvetica, sans-serif";
        ctx.fillText("Hand Detected ✓", cx, cy + 78);
        ctx.fillStyle = "#ffffff";
        ctx.shadowColor = "rgba(0, 0, 0, 0.5)";
        ctx.shadowBlur = 10;
        ctx.font = "900 46px Nunito, Arial, Helvetica, sans-serif";
        ctx.fillText(countdown, cx, cy + 134);
      } else {
        ctx.fillStyle = "rgba(255, 255, 255, 0.62)";
        ctx.font = "900 17px Nunito, Arial, Helvetica, sans-serif";
        ctx.fillText("Waiting for hand", cx, cy + 84);
      }

      drawMouseModeButton(cx, cy + 164);
      ctx.restore();
    }

    function getScreenShakeOffset() {
      const elapsed = performance.now() - gameState.shakeStartedAt;
      if (elapsed < 0 || elapsed > gameState.shakeDuration) {
        return { x: 0, y: 0 };
      }

      const falloff = 1 - elapsed / gameState.shakeDuration;
      const amount = gameState.shakeAmount * falloff;
      return {
        x: Math.sin(elapsed * 0.55) * amount,
        y: Math.cos(elapsed * 0.72) * amount
      };
    }

    function draw() {
      ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);

      if (gameState.mode !== "playing") {
        drawStartup();
        return;
      }

      drawBackground();
      const shake = getScreenShakeOffset();
      ctx.save();
      ctx.translate(shake.x, shake.y);
      drawTable();
      drawLandingMarker();
      drawPaddle(gameState.bot, true);
      drawBall(gameState.simTime);
      drawPaddle(gameState.player, false);
      drawHitFeedback();
      ctx.restore();
      drawHud();
      drawPauseOverlay();
      drawGameOver();
    }

    function frame(now) {
      update(now);
      draw();
      requestAnimationFrame(frame);
    }

    async function init() {
      resize();
      requestAnimationFrame(frame);
      document.fonts?.load("900 56px Nunito")?.catch(() => {});

      try {
        gameState.message = "Starting webcam";
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 960 },
            height: { ideal: 540 }
          },
          audio: false
        });
        video.srcObject = stream;
        await new Promise((resolve) => {
          video.onloadedmetadata = resolve;
        });
        await video.play();

        gameState.message = "Loading hand tracker";
        const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@latest/wasm");
        const handOptions = {
          baseOptions: {
            modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
            delegate: "GPU"
          },
          runningMode: "VIDEO",
          numHands: 2,
          minHandDetectionConfidence: 0.55,
          minHandPresenceConfidence: 0.5,
          minTrackingConfidence: 0.5
        };

        try {
          gameState.handLandmarker = await HandLandmarker.createFromOptions(vision, handOptions);
        } catch {
          handOptions.baseOptions.delegate = "CPU";
          gameState.handLandmarker = await HandLandmarker.createFromOptions(vision, handOptions);
        }

        if (gameState.inputMode !== "mouse" && gameState.mode === "loading") {
          gameState.mode = "intro";
          gameState.phase = "waiting-hand";
          gameState.message = "Show your right hand to the camera to play";
        }
      } catch (error) {
        if (gameState.inputMode === "mouse" && gameState.mode === "playing") {
          return;
        }

        gameState.mode = "error";
        gameState.phase = "error";
        if (error?.name === "NotAllowedError" || error?.name === "PermissionDeniedError") {
          gameState.errorTitle = "Camera permission denied";
          gameState.errorDetail = "Allow camera access for this site, then reload the page.";
        } else if (error?.name === "NotFoundError" || error?.name === "DevicesNotFoundError") {
          gameState.errorTitle = "No camera found";
          gameState.errorDetail = "Connect a webcam, then reload this page.";
        } else {
          gameState.errorTitle = "Camera setup failed";
          gameState.errorDetail = "Use Chrome or Safari on localhost and allow webcam access.";
        }
        gameState.message = gameState.errorTitle;
      }
    }

    window.addEventListener("resize", resize);
    window.addEventListener("pointerdown", handlePointerDown);
    window.addEventListener("pointermove", handlePointerMove);
    window.addEventListener("keydown", handleKeyDown);
    init();
  </script>
</body>
</html>
